quarkus:
  application:
    name: user-service
  http:
    port: 8081
  datasource:
    db-kind: postgresql
    username: carsharing
    password: carsharing
    jdbc:
      url: jdbc:postgresql://localhost:5432/userdb
  hibernate-orm:
    schema-management:
      strategy: drop-and-create
    log:
      sql: true
  smallrye-openapi:
    path: /openapi
  swagger-ui:
    always-include: true
  smallrye-jwt:
    enabled: true

mp:
  jwt:
    verify:
      publickey:
        location: public.pem
    issuer: car-sharing

"%dev":
  quarkus:
    hibernate-orm:
      log:
        sql: true

"%prod":
  quarkus:
    datasource:
      jdbc:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/userdb
    hibernate-orm:
      log:
        sql: false

smallrye:
  jwt:
    sign:
      key:
        location: private.pem