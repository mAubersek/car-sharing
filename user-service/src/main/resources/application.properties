# Application
quarkus.application.name=user-service

# HTTP
quarkus.http.port=8081

# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=carsharing
quarkus.datasource.password=carsharing
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/userdb

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true

# OpenAPI / Swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# JWT (default = dev: keys from classpath)
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.publickey.location=public.pem
mp.jwt.verify.issuer=car-sharing
smallrye.jwt.sign.key.location=private.pem

# Prod profile: read keys from mounted secret
%prod.mp.jwt.verify.publickey.location=file:/etc/jwt/public.pem
%prod.smallrye.jwt.sign.key.location=file:/etc/jwt/private.pem

# Dev profile
%dev.quarkus.hibernate-orm.log.sql=true

# Prod profile
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/userdb
%prod.quarkus.hibernate-orm.log.sql=false