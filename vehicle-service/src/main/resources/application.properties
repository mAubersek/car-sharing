# Application
quarkus.application.name=vehicle-service

  # HTTP
quarkus.http.port=8082

  # DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=carsharing
quarkus.datasource.password=carsharing
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/vehicledb

  # Hibernate
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true

  # OpenAPI / Swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

  # JWT (validation only — vehicle-service doesn't sign tokens)
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.publickey.location=public.pem
mp.jwt.verify.issuer=car-sharing

  # Dev profile
%dev.quarkus.hibernate-orm.log.sql=true

  # Prod profile
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/vehicledb
%prod.quarkus.hibernate-orm.log.sql=false

# NATS connection
quarkus.messaging.nats.connection.servers=nats://localhost:4222

# Declare the stream
quarkus.messaging.nats.streams.BOOKINGS.configuration.subjects=booking.*

# Declare a pull-consumer that filters to "booking.created"
quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-created-consumer.consumer-configuration.filter-subjects=booking.created
quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-created-consumer.consumer-configuration.durable=true

# Wire the incoming channel to that consumer
mp.messaging.incoming.booking-created.connector=quarkus-jetstream
mp.messaging.incoming.booking-created.stream=BOOKINGS
mp.messaging.incoming.booking-created.consumer=booking-created-consumer

# Booking update
quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-started-consumer.consumer-configuration.filter-subjects=booking.started
quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-started-consumer.consumer-configuration.durable=true

quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-ended-consumer.consumer-configuration.filter-subjects=booking.ended
quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-ended-consumer.consumer-configuration.durable=true

quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-cancelled-consumer.consumer-configuration.filter-subjects=booking.cancelled
quarkus.messaging.nats.streams.BOOKINGS.pull-consumers.booking-cancelled-consumer.consumer-configuration.durable=true

mp.messaging.incoming.booking-started.connector=quarkus-jetstream
mp.messaging.incoming.booking-started.stream=BOOKINGS
mp.messaging.incoming.booking-started.consumer=booking-started-consumer

mp.messaging.incoming.booking-ended.connector=quarkus-jetstream
mp.messaging.incoming.booking-ended.stream=BOOKINGS
mp.messaging.incoming.booking-ended.consumer=booking-ended-consumer

mp.messaging.incoming.booking-cancelled.connector=quarkus-jetstream
mp.messaging.incoming.booking-cancelled.stream=BOOKINGS
mp.messaging.incoming.booking-cancelled.consumer=booking-cancelled-consumer