apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: maubersek/car-sharing-booking-service:1.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: QUARKUS_PROFILE
              value: prod
            - name: QUARKUS_HTTP_PORT
              value: "8083"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://postgres:5432/bookingdb
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: QUARKUS_MESSAGING_NATS_CONNECTION_SERVERS
              value: nats://nats:4222
            - name: QUARKUS_REST_CLIENT_USER_SERVICE_URL
              value: http://user-service:8081
            - name: QUARKUS_REST_CLIENT_VEHICLE_SERVICE_URL
              value: http://vehicle-service:8082
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/jwt
              readOnly: true
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
spec:
  selector:
    app: booking-service
  ports:
    - port: 8083
      targetPort: 8083