services:
  postgres:
    image: postgres:16
    container_name: carsharing-postgres
    environment:
      POSTGRES_USER: carsharing
      POSTGRES_PASSWORD: carsharing
      POSTGRES_DB: carsharing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  nats:
    image: nats:latest
    container_name: carsharing-nats
    command: ["-js"] # enables JetStream
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres-data: